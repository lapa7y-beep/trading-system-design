# ============================================================================
# ATLAS Graph IR — Phase 1
# ============================================================================
# Version: 1.0
# Created: 2026-04-16
# Scope: docs/what/decisions/011-phase1-scope.md
#
# 이 파일은 Phase 1의 Single Source of Truth 다.
# - Node / Edge / Port / Adapter 정의를 단일 문서에 집약
# - 사람이 읽고 쓸 수 있음
# - Phase 2+ 에서 Code Generator 도입 시 입력으로 사용 예정
# - 현재 Phase 1은 "사람이 읽는 체크리스트 + 수동 검증 기준"
# ============================================================================

version: "1.1.0"
phase: 1
updated: "2026-04-17"

# ---------------------------------------------------------------------------
# 메타
# ---------------------------------------------------------------------------
meta:
  scope_document: "docs/what/decisions/011-phase1-scope.md"
  paths_active: ["path1"]
  paths_deferred: ["path2", "path3", "path4", "path5", "path6"]
  complexity_profile: "minimum_viable"

# ---------------------------------------------------------------------------
# Ports — 외부 의존성의 추상화
# ---------------------------------------------------------------------------
ports:
  MarketDataPort:
    methods: [subscribe, unsubscribe, stream, get_current_price, get_historical]
    adapters:
      primary: KISWebSocketAdapter
      fallback: KISRestAdapter
      mock: CSVReplayAdapter
      synthetic: SyntheticMarketAdapter  # synthetic-exchange-spec

  OrderPort:
    methods: [submit, cancel, get_order_status]
    adapters:
      mock: MockOrderAdapter
      synthetic: SyntheticOrderAdapter
      kis_paper: KISPaperOrderAdapter
      kis_live: KISLiveOrderAdapter      # Phase 2 진입까지 사용 금지

  AccountPort:
    methods: [get_balance, get_positions, get_position, reconcile]
    adapters:
      mock: MockAccountAdapter
      synthetic: SyntheticAccountAdapter
      kis_paper: KISPaperAccountAdapter
      kis_live: KISLiveAccountAdapter    # Phase 2 진입까지 사용 금지

  StoragePort:
    methods: [save_ohlcv, load_ohlcv, save_trade, update_position, load_position, load_all_positions, save_pnl, load_portfolio_snapshot]
    adapters:
      primary: PostgresStorageAdapter
      mock: InMemoryStorageAdapter     # 테스트용

  ClockPort:
    methods: [now, sleep, is_trading_hours, trading_hours_check]
    adapters:
      live: WallClockAdapter
      backtest: HistoricalClockAdapter

  StrategyRuntimePort:
    methods: [load, evaluate, list]
    adapters:
      primary: FileSystemStrategyLoader    # strategies/*.py 로드

  AuditPort:
    methods: [log, query_recent, query_by_correlation]
    adapters:
      primary: PostgresAuditAdapter
      mock: StdoutAuditAdapter             # 테스트용

  ExecutionEventPort:                       # ADR-013 신설: 체결 통보 push 수신
    methods: [subscribe, unsubscribe]
    adapters:
      mock: MockExecutionEventAdapter
      synthetic: SyntheticExecutionEventAdapter
      kis_paper: KISPaperExecutionEventAdapter
      kis_live: KISLiveExecutionEventAdapter   # Phase 2 진입까지 사용 금지

# ---------------------------------------------------------------------------
# Shared Stores — Path 간 간접 연결 지점
# ---------------------------------------------------------------------------
shared_stores:
  MarketDataStore:
    port: StoragePort
    tables: [market_ohlcv]
    writers: [MarketDataReceiver]
    readers: [IndicatorCalculator, backtest_cli]

  PortfolioStore:
    port: StoragePort
    tables: [positions, trades, daily_pnl]
    writers: [OrderExecutor, TradingFSM]
    readers: [RiskGuard, StrategyEngine, cli_status]

  AuditStore:
    port: AuditPort
    tables: [audit_events, order_tracker]
    writers: [OrderExecutor, RiskGuard, TradingFSM, cli]
    readers: [cli_audit, cli_orders]

# ---------------------------------------------------------------------------
# Nodes — Path 1 Phase 1 (6개)
# ---------------------------------------------------------------------------
nodes:

  MarketDataReceiver:
    path: path1
    category: core
    runMode: stream_with_poll_fallback
    ports_used: [MarketDataPort]
    inputs:
      - type: config
        from: "config/watchlist.yaml"
        field: symbols
    outputs:
      - edge: quote_stream
        type: DataFlow
        to: IndicatorCalculator
    state:
      - connection_state: "CONNECTED | RECONNECTING | FALLBACK_POLL"
    failure_policy:
      - on_ws_fail_3x: "switch to poll mode"
      - on_poll_fail: "emit audit_event severity=error"

  IndicatorCalculator:
    path: path1
    category: core
    runMode: event
    ports_used: []
    inputs:
      - edge: quote_stream
        from: MarketDataReceiver
    outputs:
      - edge: indicator_bundle
        type: DataFlow
        to: StrategyEngine
    state:
      - ring_buffer_per_symbol: 200
    supported_indicators: [sma, ema, rsi, macd, bollinger, atr]

  StrategyEngine:
    path: path1
    category: strategy
    runMode: event
    ports_used: [StrategyRuntimePort, StoragePort]
    inputs:
      - edge: indicator_bundle
        from: IndicatorCalculator
      - edge: position_snapshot
        from: PortfolioStore
        role: ConfigRef
    outputs:
      - edge: signal_output
        type: DataFlow
        to: RiskGuard
    strategy_load:
      source: "strategies/*.py"
      active_count: 1             # Phase 1 제약
      hot_reload: false

  RiskGuard:
    path: path1
    category: core
    runMode: event
    ports_used: [StoragePort, ClockPort, AuditPort, AccountPort]
    inputs:
      - edge: signal_output
        from: StrategyEngine
      - edge: portfolio_snapshot
        from: PortfolioStore
        role: ConfigRef
    outputs:
      - edge: approved_signal
        type: DataFlow
        to: OrderExecutor
      - edge: rejection_event
        type: AuditTrace
        to: AuditStore
    pre_order_checks:
      - { id: 1, name: "insufficient_cash", block: true }
      - { id: 2, name: "concentration_limit", block: true, threshold: 0.20 }
      - { id: 3, name: "daily_loss_limit", block: "entry_only", threshold: -0.02 }
      - { id: 4, name: "trade_count_limit", block: true, threshold: 40 }
      - { id: 5, name: "outside_trading_hours", block: true }
      - { id: 6, name: "vi_triggered", block: true }
      - { id: 7, name: "circuit_breaker_open", block: true }
      - { id: 8, name: "price_limit_violation", block: true }  # quant-spec §5.3: 상하한가 ±30% 위반
    deferred_checks_phase2:
      - sector_concentration
      - correlation_check
      - leverage_limit
      - market_regime
      - var_calculation

  OrderExecutor:
    path: path1
    category: core
    runMode: stateful_service
    ports_used: [OrderPort, StoragePort, AuditPort]
    inputs:
      - edge: approved_signal
        from: RiskGuard
    outputs:
      - edge: order_ack
        type: Event
        to: TradingFSM
      - edge: order_audit
        type: AuditTrace
        to: AuditStore
    responsibility: "주문 요청만. 체결 수신은 ExecutionReceiver 담당 (ADR-013)"
    idempotency:
      key: order_uuid
      enforce: true
    order_types_supported: [limit_buy, limit_sell, market_buy, market_sell]
    deferred_order_types_phase2:
      - amend, cancel_replace, ioc, fok, stop, stop_limit, oco, bracket
    circuit_breaker:
      window_seconds: 60
      max_failures: 3
      on_trip: "emit FSM event BROKER_FAILURE → SAFE_MODE"

  ExecutionReceiver:                             # ADR-013 신설: 체결 통보 수신
    path: path1
    category: core
    runMode: event
    ports_used: [ExecutionEventPort, StoragePort, AuditPort]
    inputs:
      - edge: execution_event
        from: ExecutionEventPort
        role: DataPipe
    outputs:
      - edge: execution_event
        type: Event
        to: TradingFSM
      - edge: execution_event
        type: AuditTrace
        to: AuditStore
      - edge: portfolio_update
        type: StateTransition
        to: PortfolioStore
    responsibility: "체결 통보 구독, trades INSERT, PortfolioStore(cash/positions) 갱신, TradingFSM에 event emit"
    idempotency:
      key: execution_uuid
      enforce: true

  TradingFSM:
    path: path1
    category: core
    runMode: stateful_service
    ports_used: [StoragePort, AuditPort, AccountPort]
    inputs:
      - edge: order_ack
        from: OrderExecutor
      - edge: execution_event
        from: ExecutionReceiver
      - edge: halt_signal
        from: cli_halt
        role: Command
    outputs:
      - edge: state_transition
        type: StateTransition
        to: PortfolioStore
      - edge: state_transition
        type: AuditTrace
        to: AuditStore
    states: [IDLE, ENTRY_PENDING, IN_POSITION, EXIT_PENDING, ERROR, SAFE_MODE]
    transitions:
      - { from: IDLE,           to: ENTRY_PENDING, trigger: entry_signal }
      - { from: ENTRY_PENDING,  to: IN_POSITION,   trigger: fill_complete }
      - { from: ENTRY_PENDING,  to: IDLE,          trigger: cancel_or_reject }
      - { from: ENTRY_PENDING,  to: ERROR,         trigger: broker_error }
      - { from: IN_POSITION,    to: EXIT_PENDING,  trigger: exit_signal }
      - { from: EXIT_PENDING,   to: IDLE,          trigger: fill_complete }
      - { from: EXIT_PENDING,   to: IN_POSITION,   trigger: cancel }
      - { from: EXIT_PENDING,   to: ERROR,         trigger: broker_error }
      - { from: ERROR,          to: IDLE,          trigger: recovery }
      - { from: ERROR,          to: SAFE_MODE,     trigger: unrecoverable }
      - { from: "*",            to: SAFE_MODE,     trigger: halt_requested }
      - { from: SAFE_MODE,      to: IDLE,          trigger: manual_resume }

# ---------------------------------------------------------------------------
# Edges — 16개 (ADR-013: ExecutionReceiver 분리로 e10/e11 재배치, e15/e16 신설)
# ---------------------------------------------------------------------------
edges:
  - { id: e01, from: MarketDataPort,      to: MarketDataReceiver,   type: DataFlow,       role: DataPipe,    name: raw_tick }
  - { id: e02, from: MarketDataReceiver,  to: IndicatorCalculator,  type: DataFlow,       role: DataPipe,    name: quote_stream }
  - { id: e03, from: IndicatorCalculator, to: StrategyEngine,       type: DataFlow,       role: DataPipe,    name: indicator_bundle }
  - { id: e04, from: PortfolioStore,      to: StrategyEngine,       type: DataFlow,       role: ConfigRef,   name: position_snapshot }
  - { id: e05, from: StrategyEngine,      to: RiskGuard,            type: DataFlow,       role: DataPipe,    name: signal_output }
  - { id: e06, from: PortfolioStore,      to: RiskGuard,            type: DataFlow,       role: ConfigRef,   name: portfolio_snapshot }
  - { id: e07, from: RiskGuard,           to: OrderExecutor,        type: DataFlow,       role: DataPipe,    name: approved_signal }
  - { id: e08, from: RiskGuard,           to: AuditStore,           type: Event,          role: AuditTrace,  name: rejection_event }
  - { id: e09, from: OrderExecutor,       to: OrderPort,            type: DataFlow,       role: DataPipe,    name: order_request }
  - { id: e10, from: OrderExecutor,       to: TradingFSM,           type: Event,          role: EventNotify, name: order_ack }
  - { id: e11, from: OrderExecutor,       to: AuditStore,           type: Event,          role: AuditTrace,  name: order_audit }
  - { id: e12, from: TradingFSM,          to: PortfolioStore,       type: StateTransition, role: DataPipe,   name: state_transition }
  - { id: e13, from: TradingFSM,          to: AuditStore,           type: StateTransition, role: AuditTrace, name: fsm_audit }
  - { id: e14, from: cli_halt,            to: TradingFSM,           type: Event,          role: Command,     name: halt_signal }
  - { id: e15, from: ExecutionEventPort,  to: ExecutionReceiver,    type: DataFlow,       role: DataPipe,    name: execution_event }
  - { id: e16, from: ExecutionReceiver,   to: TradingFSM,           type: Event,          role: EventNotify, name: execution_event }
  - { id: e17, from: ExecutionReceiver,   to: PortfolioStore,       type: StateTransition, role: DataPipe,   name: portfolio_update }
  - { id: e18, from: ExecutionReceiver,   to: AuditStore,           type: Event,          role: AuditTrace,  name: execution_audit }

# ---------------------------------------------------------------------------
# Domain Types — 20개 (전체 정의는 docs/what/specs/domain-types-phase1.md 참조)
# ---------------------------------------------------------------------------
domain_types:
  primitives: [Symbol, Price, Quantity, Money, CorrelationId]
  enums: [OrderSide, OrderType, OrderStatus, FSMState, BrokerMode]
  market: [Quote, OHLCV, IndicatorBundle]
  signal: [SignalOutput]
  order: [OrderRequest, OrderResult, TradeRecord]
  portfolio: [Position, PortfolioSnapshot]
  risk: [RiskDecision]

# ---------------------------------------------------------------------------
# DB Tables — 6개
# ---------------------------------------------------------------------------
db_tables:
  - market_ohlcv
  - order_tracker
  - trades
  - positions
  - daily_pnl
  - audit_events

# ---------------------------------------------------------------------------
# Four Critical Safeguards — Phase 1 적용 여부
# ---------------------------------------------------------------------------
safeguards:
  duplicate_order_prevention:
    status: active
    mechanism: "order_uuid (UUID) + order_tracker PK constraint"

  state_account_consistency:
    status: active
    mechanism: "TradingFSM state_transition → positions table atomic update"

  event_durability:
    status: active_minimum
    mechanism: "audit_events append-only + immutable trigger"
    note: "Phase 1은 최소 구현. Outbox pattern 은 Phase 2."

  command_control_security:
    status: active_minimum
    mechanism: "CLI via SSH + OS-level auth. Telegram 4-layer auth는 Phase 2."

# ---------------------------------------------------------------------------
# 합격 기준 — 변경 금지
# ---------------------------------------------------------------------------
acceptance_criteria:
  - id: 1
    desc: "백테스트 샤프 > 1.0"
    verify: "atlas backtest → result.json"
  - id: 2
    desc: "모의투자 5거래일 무사고"
    verify: "SELECT COUNT(*) FROM audit_events WHERE severity IN ('error','critical') AND occurred_at >= NOW() - INTERVAL '5 days' → 0"
  - id: 3
    desc: "일일 손익 자동 기록"
    verify: "SELECT COUNT(*) FROM daily_pnl WHERE trade_date >= CURRENT_DATE - INTERVAL '5 days' → 5"
  - id: 4
    desc: "atlas halt 30초 내 차단"
    verify: "halt 시각 vs 최종 order 시각 diff < 30s"
  - id: 5
    desc: "Crash 후 포지션 복원"
    verify: "kill -9 → restart → positions 테이블과 FSM 상태 일치"

# ---------------------------------------------------------------------------
# 수치 체크섬 — 활성 문서 일관성 검증용
# ---------------------------------------------------------------------------
expected_counts:
  nodes: 7              # +1: ExecutionReceiver (ADR-013)
  ports: 8              # +1: ExecutionEventPort (ADR-013)
  shared_stores: 3
  edges: 18             # +4: e15 Port→ExecReceiver, e16 execution_event, e17 portfolio_update, e18 audit
  domain_types: 20
  db_tables: 6
  adapters_primary: 14  # +3: Execution 3 modes (Mock/KISPaper/Synthetic)
  pre_order_checks: 8
  fsm_states: 6
  fsm_transitions: 12
  cli_commands: 12
  acceptance_criteria: 5

# 이 수치가 다른 활성 문서와 다르면 통폐합 실패.
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Phase 2-0: API 레이어 (Phase 1 완료 후 첫 번째 작업)
# ---------------------------------------------------------------------------
api_layer:
  status: "deferred_phase2_start"
  framework: "FastAPI"
  port: 8000
  location: "atlas/api/"

  principles:
    - "HTML은 API 호출과 표시만 — 로직은 라우터에"
    - "모든 응답 JSON — HTML/React 동일 엔드포인트 재사용"
    - "control은 control_file.py 경유 — CLI와 동일 경로"
    - "React 전환 시 백엔드 무변경 — 프론트엔드만 교체"

  routers:
    status:
      endpoints:
        - "GET /api/status       → 시스템 전체 상태"
        - "GET /api/health       → Safeguards 4개 상태"
        - "GET /api/audit        → 감사 로그 최근 N건"
      db_tables: ["audit_events", "positions"]
    trading:
      endpoints:
        - "GET /api/positions    → 보유 포지션 목록"
        - "GET /api/pnl          → 일간/누적 P&L"
        - "GET /api/orders       → 주문 이력 최근 N건"
        - "GET /api/orders/live  → 미체결 주문"
      db_tables: ["positions", "trades", "daily_pnl", "order_tracker"]
    control:
      endpoints:
        - "POST /api/control/halt   → control_file.py → HALTED"
        - "POST /api/control/resume → control_file.py → ACTIVE"
        - "POST /api/control/stop   → SIGTERM to daemon"
      mechanism: "control_file.py 재사용 (CLI와 동일 경로)"
      auth: "localhost only (Phase 2 Telegram auth 전까지)"
    config:
      endpoints:
        - "GET  /api/config         → config.yaml 읽기"
        - "POST /api/config         → config.yaml 저장 (Validator 통과 후)"
      validation: "pydantic Config 모델 통과 필수"
    strategies:
      endpoints:
        - "GET  /api/strategies             → strategies/*.py 목록"
        - "GET  /api/strategies/{name}      → 전략 파일 내용"
        - "POST /api/strategies/{name}      → 전략 파일 저장"
      storage: "파일시스템 (strategies/*.py)"
    backtest:
      endpoints:
        - "POST /api/backtest          → 백테스트 실행 (비동기)"
        - "GET  /api/backtest/{job_id} → 결과 조회"
      mechanism: "BackgroundTasks → backtest/runner.py 재사용"

  websockets:
    fsm_stream:
      path: "/ws/fsm"
      payload: "FSMState per symbol, 변화 시 push"
      source: "TradingFSM state_transition 후크"
    orders_stream:
      path: "/ws/orders"
      payload: "OrderResult 체결/거절 이벤트"
      source: "OrderExecutor → WebSocket broadcast"

  static_html:
    location: "atlas/api/static/"
    pages:
      - "index.html    — 메인 레이아웃"
      - "control.html  — HALT/Resume/Stop 버튼"
      - "policy.html   — 설정 폼"
      - "strategy.html — 전략 파일 편집기"
    rule: "HTML은 fetch()/WebSocket 호출만. 로직 없음."
    react_migration: "static/ 폴더를 React build 결과물로 교체하면 전환 완료"

  endpoint_count:
    rest: 14
    websocket: 2
    total: 16

# ---------------------------------------------------------------------------
# 프론트엔드 기술스택 확정 (Phase 2-0)
# ---------------------------------------------------------------------------
frontend_stack:
  strategy: "A+B 조합 → React 전환 경로 확보"
  components:
    grafana:
      role: "읽기 전용 모니터링 (차트, 테이블, 수치)"
      datasource: "PostgreSQL 직결"
      covers:
        - "Overview KPI 패널"
        - "P1 Trading 차트 (OHLCV + MA)"
        - "P4 Portfolio 성과 차트"
        - "Market data 수집 현황"
        - "Health Safeguards 상태"
        - "System 저장소 현황"
      phase: "2-0"
    html_control:
      role: "제어/설정 화면 (버튼, 폼)"
      server: "FastAPI /static/ 서빙"
      covers:
        - "P1 Control (HALT/Resume/Stop)"
        - "P1 Policy (config 편집)"
        - "Strategy Edit/Backtest"
        - "Rules 일부 (수동 승인)"
      phase: "2-0"
    telegram_bot:
      role: "긴급 제어 + 승인 (모바일)"
      covers:
        - "/halt  /resume  /stop"
        - "/status  /positions  /pnl"
        - "/approve {id}  /reject {id}"
        - "체결/에러 알림 push"
      phase: "2-0"
  react_migration:
    trigger: "Grafana + HTML 운영 안정화 후 필요 시"
    scope: "static/ → React build 교체. FastAPI API 무변경."
    prerequisite: "React 학습 or Claude Code 활용"

# ---------------------------------------------------------------------------
# Phase 2-0: Grafana 구성 상세
# ---------------------------------------------------------------------------
grafana_layer:
  status: "deferred_phase2_start"
  datasource: "PostgreSQL 직결 (FastAPI 불필요, 읽기 전용)"
  dashboards:
    - id: "overview"
      file: "grafana/dashboards/overview.json"
      panels: ["Stat×4(P&L/포지션/체결/Sharpe)", "Table(포지션)", "Bar(전략성과)", "Table(체결이력)"]
    - id: "p1_monitor"
      file: "grafana/dashboards/p1_monitor.json"
      panels: ["Table(FSM상태)", "TimeSeries(OHLCV+MA)", "Table(주문로그)"]
    - id: "market_data"
      file: "grafana/dashboards/market_data.json"
      panels: ["Stat×3(WS/종목수/봉수)", "Stat(마지막수집)", "Table(OHLCV미리보기)"]
    - id: "health"
      file: "grafana/dashboards/health.json"
      panels: ["Stat×4(Safeguards)", "Table(노드상태)", "Table(계좌일관성)", "Table(감사로그)"]
    - id: "system"
      file: "grafana/dashboards/system.json"
      panels: ["TimeSeries(EventBus처리량)", "Stat(적체)", "Table(Docker)", "Table(Scheduler)", "Stat×6(저장소)"]
  additional_services: ["grafana", "prometheus", "cadvisor", "redis-exporter"]

# ---------------------------------------------------------------------------
# Phase 2-0: Telegram Bot 상세
# ---------------------------------------------------------------------------
telegram_bot:
  status: "deferred_phase2_start"
  library: "aiogram>=3.0"
  location: "atlas/adapters/telegram/bot.py"
  priority: "긴급 제어 1순위 — 화면 버튼 없음"
  commands:
    control: ["/halt", "/resume", "/stop"]
    query:   ["/status", "/positions", "/pnl", "/orders"]
    approval:["/approve {id}", "/reject {id}"]
  push_notifications:
    - trigger: "OrderExecutor.on_fill"
      message: "체결: {symbol} {side} {qty}주 @{price}"
    - trigger: "audit_events.severity IN (error, critical)"
      message: "에러: {message}"
    - trigger: "scheduler.15:50"
      message: "일일 리포트: P&L {pnl} / Sharpe {sharpe}"
