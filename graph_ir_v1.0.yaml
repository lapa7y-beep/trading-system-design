# HR-DAG Trading System — Graph IR
# Single Source of Truth
# 모든 노드, 엣지, 스토어, 설정이 이 파일에서 파생된다.
# Version: 1.0.0
# Date: 2026-04-15

metadata:
  system_name: "HR-DAG Trading System"
  version: "1.0.0"
  author: "jdw"
  target_market: "KOSPI/KOSDAQ"
  broker: "KIS (Korea Investment & Securities)"
  tech_stack:
    language: "python3.11+"
    async: asyncio
    fsm: transitions
    indicators: pandas-ta
    validation: pydantic
    db: "postgresql16+timescaledb+age+pgvector"
    cache: redis
    agent_framework: langgraph
    container: docker-compose
    monitoring: grafana
    alert: telegram

# ============================================================
# PATHS — 6 Isolated Paths
# ============================================================

paths:
  path1:
    name: "Realtime Trading"
    description: "실시간 시세 수신 → 지표 → 전략 → 주문 실행 → 포지션 추적"
    llm_policy: "ALL_L0"
    subpaths: ["1a_universe", "1b_execution", "1c_position"]

  path2:
    name: "Knowledge Building"
    description: "외부 데이터 수집 → 파싱 → 온톨로지 → 인과 추론 → 검색"
    llm_policy: "L0_L1_L2_MIXED"

  path3:
    name: "Strategy Development"
    description: "아이디어 수집 → 코드 생성 → 백테스트 → 최적화 → 배포"
    llm_policy: "L0_L1_L2_MIXED"

  path4:
    name: "Portfolio Management"
    description: "포지션 집계 → 리스크 관리 → 충돌 해소 → 리밸런싱 → 성과"
    llm_policy: "L0_L1_MIXED"

  path5:
    name: "Watchdog & Operations"
    description: "헬스체크 → 감사 → 이상감지 → 알림 → 명령 → 리포트"
    llm_policy: "L0_L1_MIXED"

  path6:
    name: "Market Intelligence"
    description: "수급 → 호가 → 시장환경 → 종목상태 → 조건검색 → MarketContext"
    llm_policy: "ALL_L0"

# ============================================================
# NODES — 43 Nodes
# ============================================================

nodes:
  # --- Path 1A: Universe Management (3) ---
  screener:
    path: path1.1a
    runMode: batch
    llm_level: L0
    ports: [ScreenerPort]
    reads: [MarketDataStore, KnowledgeStore, ConfigStore]
    writes: []
    config:
      scan_interval_minutes: 30
      pre_market_scan_time: "08:30"
      max_profiles: 5

  watchlist_manager:
    path: path1.1a
    runMode: stateful-service
    llm_level: L0
    ports: [WatchlistPort]
    reads: []
    writes: [WatchlistStore]
    config:
      max_watching: 30
      max_in_position: 10
      blacklist_default_days: 7
      consecutive_loss_blacklist: 3

  subscription_router:
    path: path1.1a
    runMode: event
    llm_level: L0
    ports: [SubscriptionPort]
    config:
      max_subscriptions: 50

  # --- Path 1B: Trade Execution (7) ---
  market_data_receiver:
    path: path1.1b
    runMode: stream
    llm_level: L0
    ports: [MarketDataPort]
    writes: [MarketDataStore]
    config:
      poll_interval_seconds: 3
      stale_tick_threshold_seconds: 3
      websocket_reconnect_interval_seconds: 30
    fallback:
      primary: KISWebSocketAdapter
      secondary: KISRestPollingAdapter
      trigger: "5_consecutive_disconnects"

  indicator_calculator:
    path: path1.1b
    runMode: event
    llm_level: L0
    ports: []
    config:
      buffer_size: 200
      indicator_set: [ma, rsi, macd, bbands, atr, volume_ma]
      ma_periods: [5, 10, 20, 60, 120]

  strategy_engine:
    path: path1.1b
    runMode: event
    llm_level: L0
    ports: []
    reads: [MarketIntelStore]
    config:
      max_concurrent_strategies: 5
      signal_cooldown_seconds: 60

  risk_guard:
    path: path1.1b
    runMode: event
    llm_level: L0
    ports: [BrokerPort]
    reads: [MarketIntelStore, ConfigStore]
    preorder_checks: 18
    config:
      allow_margin_trading: false
      max_single_order_amount: 50000000
      force_limit_on_vi: true

  dedup_guard:
    path: path1.1b
    runMode: event
    llm_level: L0
    config:
      dedup_window_seconds: 60

  order_executor:
    path: path1.1b
    runMode: event
    llm_level: L0
    ports: [BrokerPort, StoragePort]
    writes: [PortfolioStore]
    order_fsm_states: 11
    config:
      submit_timeout_ms: 5000
      unknown_retry_count: 3
      partial_fill_timeout_minutes: 5
      circuit_breaker_threshold: 3

  trading_fsm:
    path: path1.1b
    runMode: stateful-service
    llm_level: L0
    ports: [ClockPort]
    reads: [ConfigStore]
    states: [Idle, EntryPending, InPosition, ExitPending, Error, SafeMode]

  # --- Path 1C: Position Tracking (3) ---
  position_monitor:
    path: path1.1c
    runMode: stream
    llm_level: L0
    ports: [PositionMonitorPort]
    writes: [PortfolioStore]

  exit_condition_guard:
    path: path1.1c
    runMode: event
    llm_level: L0
    ports: [ExitConditionPort]
    reads: [MarketIntelStore, ConfigStore]
    exit_types: [STOP_LOSS, TAKE_PROFIT, TRAILING_STOP, TIME_LIMIT, STRATEGY_EXIT, FORCE_CLOSE]

  exit_executor:
    path: path1.1c
    runMode: event
    llm_level: L0
    ports: [ExitExecutorPort]

  # --- Path 2: Knowledge Building (6) ---
  external_collector:
    path: path2
    runMode: batch
    llm_level: L0
    ports: [DataSourcePort]
    reads: [MarketDataStore]

  document_parser:
    path: path2
    runMode: batch
    llm_level: L1
    ports: [DocumentParserPort]

  ontology_mapper:
    path: path2
    runMode: agent
    llm_level: L1
    ports: [OntologyPort, LLMPort]
    writes: [KnowledgeStore]
    agent_spec:
      framework: langgraph
      llm_task: ontology_mapping
      model: "local/gemma4"
      max_iterations: 5
      terminal_conditions: ["confidence >= 0.7"]
      checkpointer: postgresql

  causal_reasoner:
    path: path2
    runMode: agent
    llm_level: L2
    ports: [LLMPort, OntologyPort]
    writes: [KnowledgeStore]
    agent_spec:
      framework: langgraph
      llm_task: causal_reasoning
      model: "claude-sonnet"
      max_iterations: 5
      terminal_conditions: ["confidence >= 0.8", "no_new_evidence"]
      checkpointer: postgresql

  knowledge_index:
    path: path2
    runMode: stateful-service
    llm_level: L0
    ports: [SearchIndexPort]

  knowledge_scheduler:
    path: path2
    runMode: event
    llm_level: L0
    reads: [ConfigStore]
    config:
      schedule_cron: "0 6 * * 1-5"

  # --- Path 3: Strategy Development (7) ---
  strategy_collector:
    path: path3
    runMode: event
    llm_level: L1
    ports: [LLMPort]
    reads: [KnowledgeStore]
    agent_spec:
      framework: langgraph
      llm_task: idea_generation
      model: "claude-sonnet"
      max_iterations: 3

  strategy_generator:
    path: path3
    runMode: batch
    llm_level: L2
    ports: [LLMPort]
    agent_spec:
      framework: langgraph
      llm_task: code_generation
      model: "claude-sonnet"
      max_iterations: 5

  strategy_registry:
    path: path3
    runMode: stateful-service
    llm_level: L0
    ports: [StrategyRepositoryPort]
    writes: [StrategyStore]

  strategy_loader:
    path: path3
    runMode: poll
    llm_level: L0
    ports: [StrategyRuntimePort]
    reads: [StrategyStore]
    config:
      poll_interval_seconds: 30
      max_loaded: 5

  backtest_engine:
    path: path3
    runMode: batch
    llm_level: L0
    ports: [BacktestPort, MarketDataHistoryPort]
    reads: [MarketDataStore]
    config:
      max_concurrent: 4
      timeout_seconds: 300

  optimizer:
    path: path3
    runMode: batch
    llm_level: L1
    ports: [OptimizerPort]
    config:
      max_trials: 100

  strategy_evaluator:
    path: path3
    runMode: batch
    llm_level: L1
    agent_spec:
      framework: langgraph
      llm_task: result_interpretation
      model: "local/gemma4"
      max_iterations: 3

  # --- Path 4: Portfolio Management (6) ---
  position_aggregator:
    path: path4
    runMode: poll
    llm_level: L0
    ports: [PositionPort]
    reads: [PortfolioStore, MarketDataStore]
    writes: [PortfolioStore]
    config:
      poll_interval_seconds: 10
      reconcile_interval_minutes: 5

  risk_budget_manager:
    path: path4
    runMode: stateful-service
    llm_level: L0
    ports: [RiskBudgetPort]
    reads: [ConfigStore]
    config:
      max_portfolio_loss_pct: -5
      max_single_position_pct: 20
      max_daily_trades: 50

  conflict_resolver:
    path: path4
    runMode: event
    llm_level: L0
    ports: [ConflictResolutionPort]

  rebalancer:
    path: path4
    runMode: batch
    llm_level: L1
    config:
      rebalance_drift_pct: 5

  performance_analyzer:
    path: path4
    runMode: batch
    llm_level: L1
    ports: [PerformancePort, LLMPort]
    reads: [PortfolioStore]
    writes: [PortfolioStore]
    agent_spec:
      framework: langgraph
      llm_task: composite_judgment
      model: "claude-sonnet"
      max_iterations: 3

  allocation_engine:
    path: path4
    runMode: event
    llm_level: L0
    ports: [AllocationPort]
    config:
      target_volatility_pct: 15
      min_cash_pct: 10

  # --- Path 5: Watchdog & Operations (6) ---
  health_monitor:
    path: path5
    runMode: poll
    llm_level: L0
    ports: [HealthCheckPort]
    config:
      check_interval_seconds: 30
      unhealthy_threshold: 3

  audit_logger:
    path: path5
    runMode: stream
    llm_level: L0
    ports: [AuditPort]
    writes: [AuditStore]

  anomaly_detector:
    path: path5
    runMode: event
    llm_level: L1
    ports: [AnomalyDetectionPort]
    config:
      window_minutes: 5
      z_score_threshold: 3

  alert_dispatcher:
    path: path5
    runMode: event
    llm_level: L0
    ports: [AlertPort]

  command_controller:
    path: path5
    runMode: stateful-service
    llm_level: L0
    ports: [CommandPort]
    config:
      authorized_users: ["jdw"]
      approval_timeout_minutes: 30

  daily_reporter:
    path: path5
    runMode: batch
    llm_level: L1
    ports: [LLMPort]
    reads: [AuditStore, PortfolioStore, MarketIntelStore]
    config:
      report_time: "16:00"

  # --- Path 6: Market Intelligence (5) ---
  supply_demand_analyzer:
    path: path6
    runMode: poll
    llm_level: L0
    ports: [SupplyDemandPort]
    reads: [MarketDataStore]
    writes: [MarketIntelStore]
    config:
      poll_interval_seconds: 60

  orderbook_analyzer:
    path: path6
    runMode: stream
    llm_level: L0
    ports: [OrderBookPort]
    writes: [MarketIntelStore]
    config:
      spread_alert_bps: 50

  market_regime_detector:
    path: path6
    runMode: event
    llm_level: L0
    ports: [MarketRegimePort]
    writes: [MarketIntelStore]
    config:
      sector_codes: ["0001", "1001", "0028", "0017", "0024"]
      volatility_threshold: 2.0

  stock_state_monitor:
    path: path6
    runMode: poll
    llm_level: L0
    ports: [StockStatePort]
    writes: [MarketIntelStore]
    config:
      check_interval_seconds: 300
      event_lookahead_days: 5

  condition_search_bridge:
    path: path6
    runMode: batch
    llm_level: L0
    ports: [ConditionSearchPort]
    writes: [MarketIntelStore]
    config:
      hts_user_id: "${KIS_HTS_USER_ID}"
      scan_interval_minutes: 30

# ============================================================
# EDGES — 84 Edges (대표 패턴 + 간결 목록)
# ============================================================

edge_contract_patterns:
  critical_sync: &critical_sync
    delivery: sync
    ordering: strict
    retry: { max_attempts: 3, backoff: exponential, dead_letter: true }
    timeout_ms: 5000
    idempotency: true

  fast_async: &fast_async
    delivery: async
    ordering: strict
    retry: { max_attempts: 0, backoff: null, dead_letter: false }
    timeout_ms: 100
    idempotency: true

  batch_async: &batch_async
    delivery: async
    ordering: best-effort
    retry: { max_attempts: 2, backoff: fixed, dead_letter: true }
    timeout_ms: 60000
    idempotency: true

  fire_and_forget: &fire_and_forget
    delivery: fire-and-forget
    ordering: best-effort
    retry: { max_attempts: 2, backoff: fixed, dead_letter: true }
    timeout_ms: 1000
    idempotency: true

  command_sync: &command_sync
    delivery: sync
    ordering: strict
    retry: { max_attempts: 2, backoff: fixed, dead_letter: false }
    timeout_ms: 5000
    idempotency: true

edges:
  # --- Path 1A (3) ---
  - id: e_screener_to_watchlist
    type: DataFlow
    role: DataPipe
    source: screener
    target: watchlist_manager
    payload: ScreenerOutput
    contract: *batch_async

  - id: e_watchlist_to_subscription
    type: Event
    role: EventNotify
    source: watchlist_manager
    target: subscription_router
    payload: SubscriptionChange
    contract: *fast_async

  - id: e_subscription_to_market_data
    type: Event
    role: Command
    source: subscription_router
    target: market_data_receiver
    payload: SubscriptionCommand
    contract: *fast_async

  # --- Path 1B (10) ---
  - id: e_market_to_indicator
    type: DataFlow
    role: DataPipe
    source: market_data_receiver
    target: indicator_calculator
    payload: Quote
    contract: *fast_async

  - id: e_indicator_to_strategy
    type: DataFlow
    role: DataPipe
    source: indicator_calculator
    target: strategy_engine
    payload: IndicatorResult
    contract:
      <<: *fast_async
      timeout_ms: 50

  - id: e_strategy_to_riskguard
    type: DataFlow
    role: DataPipe
    source: strategy_engine
    target: risk_guard
    payload: SignalOutput
    contract:
      delivery: sync
      ordering: strict
      timeout_ms: 200
      idempotency: false

  - id: e_riskguard_to_dedup
    type: DataFlow
    role: DataPipe
    source: risk_guard
    target: dedup_guard
    payload: OrderRequest
    contract:
      delivery: sync
      ordering: strict
      timeout_ms: 50

  - id: e_dedup_to_executor
    type: DataFlow
    role: DataPipe
    source: dedup_guard
    target: order_executor
    payload: OrderRequest
    contract: *critical_sync

  - id: e_executor_to_fsm
    type: Event
    role: EventNotify
    source: order_executor
    target: trading_fsm
    payload: OrderResult
    contract:
      delivery: async
      ordering: strict
      timeout_ms: null
      idempotency: true

  - id: e_executor_to_position
    type: Event
    role: EventNotify
    source: order_executor
    target: position_monitor
    payload: ExecutionNotification
    contract:
      delivery: async
      ordering: strict
      idempotency: true

  - id: e_market_to_store
    type: DataFlow
    role: DataPipe
    source: market_data_receiver
    target: MarketDataStore
    payload: "Quote|OHLCV"
    contract: *fire_and_forget

  - id: e_executor_to_portfolio
    type: DataFlow
    role: DataPipe
    source: order_executor
    target: PortfolioStore
    payload: TradeRecord
    contract: *critical_sync

  - id: e_config_to_fsm
    type: Dependency
    role: ConfigRef
    source: ConfigStore
    target: trading_fsm
    payload: StrategyConfig
    contract:
      delivery: sync
      ordering: best-effort
      timeout_ms: 500

  # --- Path 1C (4) ---
  - id: e_position_to_exit
    type: DataFlow
    role: DataPipe
    source: position_monitor
    target: exit_condition_guard
    payload: LivePosition
    contract: *fast_async

  - id: e_exit_guard_to_executor
    type: DataFlow
    role: DataPipe
    source: exit_condition_guard
    target: exit_executor
    payload: ExitSignal
    contract:
      delivery: sync
      ordering: strict
      timeout_ms: 200

  - id: e_exit_to_riskguard
    type: DataFlow
    role: DataPipe
    source: exit_executor
    target: risk_guard
    payload: OrderRequest
    contract:
      delivery: sync
      ordering: strict
      timeout_ms: 200

  - id: e_exit_to_watchlist
    type: Event
    role: EventNotify
    source: exit_executor
    target: watchlist_manager
    payload: ExitResult
    contract: *fire_and_forget

  # --- Path 2 (9) ---
  - { id: e_collector_to_parser, type: DataFlow, role: DataPipe, source: external_collector, target: document_parser, payload: "list[RawDocument]", contract: *batch_async }
  - { id: e_parser_to_ontology, type: DataFlow, role: DataPipe, source: document_parser, target: ontology_mapper, payload: "list[ParsedDocument]", contract: *batch_async }
  - { id: e_ontology_to_causal, type: DataFlow, role: DataPipe, source: ontology_mapper, target: causal_reasoner, payload: "list[OntologyTriple]", contract: { <<: *batch_async, timeout_ms: 120000 } }
  - { id: e_causal_to_index, type: DataFlow, role: DataPipe, source: causal_reasoner, target: knowledge_index, payload: "list[CausalLink]", contract: *batch_async }
  - { id: e_ontology_to_index, type: DataFlow, role: DataPipe, source: ontology_mapper, target: knowledge_index, payload: "list[ParsedDocument]", contract: *batch_async }
  - { id: e_scheduler_to_collector, type: Event, role: Command, source: knowledge_scheduler, target: external_collector, payload: CollectionConfig, contract: *command_sync }
  - { id: e_ontology_to_store, type: DataFlow, role: DataPipe, source: ontology_mapper, target: KnowledgeStore, payload: "list[OntologyTriple]", contract: *batch_async }
  - { id: e_causal_to_store, type: DataFlow, role: DataPipe, source: causal_reasoner, target: KnowledgeStore, payload: "list[CausalLink]", contract: *batch_async }
  - { id: e_market_store_to_collector, type: Dependency, role: ConfigRef, source: MarketDataStore, target: external_collector, payload: "list[str]", contract: { delivery: sync, timeout_ms: 1000 } }

  # --- Path 3 (12) ---
  - { id: e_collector3_to_generator, type: DataFlow, role: DataPipe, source: strategy_collector, target: strategy_generator, payload: StrategyIdea, contract: *batch_async }
  - { id: e_generator_to_registry, type: DataFlow, role: DataPipe, source: strategy_generator, target: strategy_registry, payload: "StrategyMeta+Code", contract: *critical_sync }
  - { id: e_registry_to_backtest, type: DataFlow, role: DataPipe, source: strategy_registry, target: backtest_engine, payload: BacktestConfig, contract: { <<: *batch_async, timeout_ms: 300000 } }
  - { id: e_backtest_to_evaluator, type: DataFlow, role: DataPipe, source: backtest_engine, target: strategy_evaluator, payload: BacktestResult, contract: *batch_async }
  - { id: e_evaluator_to_registry, type: DataFlow, role: DataPipe, source: strategy_evaluator, target: strategy_registry, payload: StatusUpdate, contract: *critical_sync }
  - { id: e_registry_to_optimizer, type: DataFlow, role: DataPipe, source: strategy_registry, target: optimizer, payload: OptimizationConfig, contract: { <<: *batch_async, timeout_ms: 600000 } }
  - { id: e_optimizer_to_backtest, type: DataFlow, role: DataPipe, source: optimizer, target: backtest_engine, payload: "list[BacktestConfig]", contract: { <<: *batch_async, timeout_ms: 600000 } }
  - { id: e_optimizer_to_registry, type: DataFlow, role: DataPipe, source: optimizer, target: strategy_registry, payload: OptimizationResult, contract: *critical_sync }
  - { id: e_registry_to_store, type: DataFlow, role: DataPipe, source: strategy_registry, target: StrategyStore, payload: "StrategyMeta+Code", contract: *critical_sync }
  - { id: e_market_store_to_backtest, type: Dependency, role: ConfigRef, source: MarketDataStore, target: backtest_engine, payload: "dict[str,list[OHLCV]]", contract: { delivery: sync, timeout_ms: 10000 } }
  - { id: e_knowledge_to_collector3, type: Dependency, role: ConfigRef, source: KnowledgeStore, target: strategy_collector, payload: "list[CausalLink]", contract: { delivery: sync, timeout_ms: 5000 } }
  - { id: e_loader_to_path1, type: DataFlow, role: DataPipe, source: strategy_loader, target: strategy_engine, payload: StrategyInstance, contract: *critical_sync }

  # --- Path 4 (11) ---
  - { id: e_aggregator_to_risk, type: DataFlow, role: DataPipe, source: position_aggregator, target: risk_budget_manager, payload: PortfolioSnapshot, contract: { delivery: async, ordering: strict, timeout_ms: 1000 } }
  - { id: e_aggregator_to_allocation, type: DataFlow, role: DataPipe, source: position_aggregator, target: allocation_engine, payload: PortfolioSnapshot, contract: { delivery: async, ordering: strict, timeout_ms: 1000 } }
  - { id: e_conflict_to_allocation, type: DataFlow, role: DataPipe, source: conflict_resolver, target: allocation_engine, payload: ResolvedAction, contract: { delivery: sync, ordering: strict, timeout_ms: 500 } }
  - { id: e_allocation_to_risk, type: DataFlow, role: DataPipe, source: allocation_engine, target: risk_budget_manager, payload: SizingRequest, contract: { delivery: sync, ordering: strict, timeout_ms: 500 } }
  - { id: e_rebalancer_to_allocation, type: Event, role: Command, source: rebalancer, target: allocation_engine, payload: RebalanceTrigger, contract: *command_sync }
  - { id: e_aggregator_to_performance, type: DataFlow, role: DataPipe, source: position_aggregator, target: performance_analyzer, payload: PnLRecord, contract: *batch_async }
  - { id: e_signals_to_conflict, type: Event, role: EventNotify, source: strategy_engine, target: conflict_resolver, payload: "list[SignalOutput]", contract: { delivery: async, ordering: strict, timeout_ms: 500 } }
  - { id: e_risk_to_path1, type: Event, role: EventNotify, source: risk_budget_manager, target: risk_guard, payload: RiskCheckResult, contract: { delivery: sync, ordering: strict, timeout_ms: 200 } }
  - { id: e_aggregator_to_portfolio_store, type: DataFlow, role: DataPipe, source: position_aggregator, target: PortfolioStore, payload: PortfolioSnapshot, contract: *critical_sync }
  - { id: e_market_store_to_aggregator, type: Dependency, role: ConfigRef, source: MarketDataStore, target: position_aggregator, payload: "dict[str,float]", contract: { delivery: sync, timeout_ms: 500 } }
  - { id: e_performance_to_store, type: DataFlow, role: DataPipe, source: performance_analyzer, target: PortfolioStore, payload: PerformanceReport, contract: *batch_async }

  # --- Path 5 (13) ---
  - { id: e_health_to_alert, type: Event, role: EventNotify, source: health_monitor, target: alert_dispatcher, payload: HealthStatus, contract: *critical_sync }
  - { id: e_audit_to_anomaly, type: DataFlow, role: DataPipe, source: audit_logger, target: anomaly_detector, payload: AuditEvent, contract: *fast_async }
  - { id: e_anomaly_to_alert, type: Event, role: EventNotify, source: anomaly_detector, target: alert_dispatcher, payload: Anomaly, contract: *critical_sync }
  - { id: e_command_to_audit, type: DataFlow, role: AuditTrace, source: command_controller, target: audit_logger, payload: AuditEvent, contract: *fire_and_forget }
  - { id: e_audit_to_reporter, type: DataFlow, role: DataPipe, source: audit_logger, target: daily_reporter, payload: "list[AuditEvent]", contract: *batch_async }
  - { id: e_reporter_to_alert, type: Event, role: Command, source: daily_reporter, target: alert_dispatcher, payload: DailySummary, contract: *command_sync }
  - { id: e_path1_to_audit, type: Event, role: AuditTrace, source: "path1.*", target: audit_logger, payload: AuditEvent, contract: *fire_and_forget }
  - { id: e_path2_to_audit, type: Event, role: AuditTrace, source: "path2.*", target: audit_logger, payload: AuditEvent, contract: *fire_and_forget }
  - { id: e_path3_to_audit, type: Event, role: AuditTrace, source: "path3.*", target: audit_logger, payload: AuditEvent, contract: *fire_and_forget }
  - { id: e_path4_to_audit, type: Event, role: AuditTrace, source: "path4.*", target: audit_logger, payload: AuditEvent, contract: *fire_and_forget }
  - { id: e_command_to_path1, type: Event, role: Command, source: command_controller, target: trading_fsm, payload: Command, contract: *command_sync }
  - { id: e_command_to_path3, type: Event, role: Command, source: command_controller, target: strategy_registry, payload: Command, contract: *command_sync }
  - { id: e_command_to_path4, type: Event, role: Command, source: command_controller, target: risk_budget_manager, payload: Command, contract: *command_sync }

  # --- Path 6 (12) ---
  - { id: e_sd_to_store, type: DataFlow, role: DataPipe, source: supply_demand_analyzer, target: MarketIntelStore, payload: SupplyDemandSnapshot, contract: *fire_and_forget }
  - { id: e_ob_to_store, type: DataFlow, role: DataPipe, source: orderbook_analyzer, target: MarketIntelStore, payload: OrderBookAnalysis, contract: *fire_and_forget }
  - { id: e_regime_to_store, type: DataFlow, role: DataPipe, source: market_regime_detector, target: MarketIntelStore, payload: MarketEnvironment, contract: *fire_and_forget }
  - { id: e_state_to_store, type: DataFlow, role: DataPipe, source: stock_state_monitor, target: MarketIntelStore, payload: StockState, contract: *fire_and_forget }
  - { id: e_search_to_store, type: DataFlow, role: DataPipe, source: condition_search_bridge, target: MarketIntelStore, payload: ConditionResult, contract: *fire_and_forget }
  - { id: e_md_store_to_sd, type: Dependency, role: ConfigRef, source: MarketDataStore, target: supply_demand_analyzer, payload: "Quote", contract: { delivery: sync, timeout_ms: 500 } }
  - { id: e_md_store_to_ob, type: Dependency, role: ConfigRef, source: MarketDataStore, target: orderbook_analyzer, payload: "OrderBookSnapshot", contract: { delivery: sync, timeout_ms: 500 } }
  - { id: e_config_to_path6, type: Dependency, role: ConfigRef, source: ConfigStore, target: "path6.*", payload: "Config", contract: { delivery: sync, timeout_ms: 500 } }
  - { id: e_intel_to_strategy, type: Dependency, role: ConfigRef, source: MarketIntelStore, target: strategy_engine, payload: MarketContext, contract: { delivery: sync, timeout_ms: 500 } }
  - { id: e_intel_to_exit, type: Dependency, role: ConfigRef, source: MarketIntelStore, target: exit_condition_guard, payload: MarketContext, contract: { delivery: sync, timeout_ms: 500 } }
  - { id: e_intel_to_strategy3, type: Dependency, role: ConfigRef, source: MarketIntelStore, target: strategy_collector, payload: ConditionResult, contract: { delivery: sync, timeout_ms: 5000 } }
  - { id: e_regime_to_path1_urgent, type: Event, role: EventNotify, source: market_regime_detector, target: "path1.*", payload: MarketRegime, contract: { delivery: async, ordering: strict, timeout_ms: 100, idempotency: true } }

  # --- Order Lifecycle (4) ---
  - { id: e_broker_execution_notice, type: Event, role: EventNotify, source: "BrokerPort.websocket", target: order_executor, payload: ExecutionNotification, contract: { delivery: async, ordering: strict, timeout_ms: null, idempotency: true } }
  - { id: e_executor_order_tracker, type: DataFlow, role: DataPipe, source: order_executor, target: trading_fsm, payload: OrderTracker, contract: { delivery: sync, ordering: strict, timeout_ms: 200 } }
  - { id: e_stock_state_to_validator, type: Dependency, role: ConfigRef, source: MarketIntelStore, target: risk_guard, payload: StockState, contract: { delivery: sync, timeout_ms: 500 } }
  - { id: e_broker_buyable_check, type: Dependency, role: ConfigRef, source: "BrokerPort.rest", target: risk_guard, payload: "BuyableQuantity", contract: { delivery: sync, timeout_ms: 2000 } }

# ============================================================
# SHARED STORES — 8 Stores
# ============================================================

shared_stores:
  MarketDataStore:
    tables: [market_quotes, market_ohlcv, market_snapshots]
    hypertables: [market_quotes, market_snapshots]
    retention: { market_quotes: "30d", market_snapshots: "7d" }

  PortfolioStore:
    tables: [positions, trades, daily_pnl, rebalance_history, risk_events, order_tracker]
    triggers: [update_updated_at]

  ConfigStore:
    tables: [system_config, symbol_universe, schedules]
    access: read_only_at_runtime

  KnowledgeStore:
    tables: [ontology_triples, causal_links, parsed_documents]
    extensions: [age, pgvector]

  StrategyStore:
    tables: [strategies, strategy_codes, backtest_results, optimization_results]

  AuditStore:
    tables: [audit_events, health_history, alert_history, command_history, anomaly_history]
    hypertables: [audit_events, health_history]
    immutable: true
    retention: { health_history: "30d" }

  WatchlistStore:
    tables: [watchlist, watchlist_history, exit_history, screener_profiles]

  MarketIntelStore:
    tables: [supply_demand, orderbook_analysis, market_regime, stock_state, corporate_events, market_context_cache]
    hypertables: [supply_demand, orderbook_analysis, market_regime]
    retention: { supply_demand: "30d", orderbook_analysis: "7d", market_regime: "90d" }

# ============================================================
# TRADING SAFETY CONTRACT (최우선)
# ============================================================

safety:
  e2e_latency_budget:
    limit_order_ms: 500
    market_order_ms: 200
    violation: "drop_order_and_log"

  stale_price_guard:
    max_quote_age_ms: 3000
    max_spread_pct: 2.0
    violation: "drop_and_log"

  circuit_breaker:
    threshold: 3
    recovery_seconds: 30
    states: [CLOSED, OPEN, HALF_OPEN]

  kill_switch:
    command: "close_all"
    authorization: "double_confirm"
    path5_only: true

  order_safeguards:
    max_single_order_amount: 50000000
    force_limit_on_vi: true
    dedup_window_seconds: 60
    preorder_checks: 18

# ============================================================
# ADAPTER MAPPING
# ============================================================

adapters:
  broker:
    primary: KISMCPAdapter
    fallback: KISRestAdapter
    params:
      base_url: "http://localhost:3000"
      env: "${KIS_ENV}"  # "demo" | "live"

  market_data:
    primary: KISWebSocketAdapter
    fallback: KISRestPollingAdapter
    params:
      ws_url: "ws://ops.koreainvestment.com:21000"

  storage:
    implementation: PostgresStorageAdapter
    params:
      dsn: "${POSTGRES_DSN}"

  clock:
    implementation: KRXClockAdapter
    params:
      timezone: "Asia/Seoul"

  llm:
    task_routing:
      causal_reasoning: { model: "claude-sonnet", max_tokens: 4096 }
      idea_generation: { model: "claude-sonnet", max_tokens: 2048 }
      composite_judgment: { model: "claude-sonnet", max_tokens: 2048 }
      ontology_mapping: { model: "local/gemma4", max_tokens: 2048 }
      result_interpretation: { model: "local/gemma4", max_tokens: 2048 }

  alert:
    implementation: TelegramAlertAdapter
    params:
      bot_token: "${TELEGRAM_BOT_TOKEN}"
      chat_id: "${TELEGRAM_CHAT_ID}"

